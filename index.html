<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dr. Pharmacology - 臨床解毒試驗</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        :root { --vh: 1vh; }
        body {
            background-color: #0b0f12; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            height: calc(var(--vh) * 100); overflow: hidden; touch-action: none;
            padding-bottom: env(safe-area-inset-bottom);
        }
        header {
            text-align: center; padding: 6px 5px; width: 100%;
            background: #11161b; border-bottom: 1px solid #1f272e; flex-shrink: 0;
        }
        h1 { margin: 0; font-size: 16px; color: #4da6ff; }
        .warn-text { font-size: 11px; color: #ff4757; margin-top: 1px; font-weight: bold; }

        #main-layout {
            display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 420px;
            flex-grow: 1; justify-content: space-between; position: relative; padding: 5px; overflow: hidden;
        }
        #status-bar {
            display: flex; justify-content: space-between; width: 100%;
            background: #11161b; border: 1px solid #1f272e; border-radius: 6px;
            padding: 6px 12px; font-size: 13px; flex-shrink: 0; margin-bottom: 4px;
        }
        #stage-container {
            position: relative; width: 100%; flex-grow: 1;
            display: flex; align-items: center; justify-content: center; overflow: hidden; min-height: 0;
        }
        canvas {
            background: #06090b; border: 2px solid #233541; border-radius: 6px;
            max-height: 100%; max-width: 100%; object-fit: contain; display: block;
        }

        #html-control-pad {
            width: 100%; display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 12px;
            padding: 12px 8px; background: #161d24; border-top: 2px solid #233541;
            border-radius: 12px 12px 0 0; flex-shrink: 0; box-shadow: 0 -4px 15px rgba(0,0,0,0.4);
        }
        .dir-group { display: flex; flex-direction: column; gap: 8px; }
        .ctrl-btn {
            background: linear-gradient(145deg, #25333f, #19232c); border: 2px solid #3d5466;
            border-radius: 10px; color: #00ffcc; font-size: 20px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4); cursor: pointer; min-height: 52px;
            transition: all 0.05s ease;
        }
        .ctrl-btn:active { background: linear-gradient(145deg, #121a20, #1c2730); border-color: #00ffcc; transform: scale(0.96); }
        .ctrl-btn-cycle {
            background: linear-gradient(145deg, #e67e22, #d35400); border-color: #f39c12;
            color: #fff; font-size: 14px; letter-spacing: 1px; flex-direction: column; gap: 4px; height: 100%;
        }
        .ctrl-btn-cycle span { font-size: 10px; opacity: 0.8; }
        .ctrl-btn-cycle:active { background: #ba4a00; border-color: #e67e22; }

        #medicalModal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%;
            background: #11161b; border: 2px solid #4da6ff; border-radius: 14px; padding: 16px;
            z-index: 100; box-shadow: 0 0 30px rgba(0,0,0,0.95); display: none; text-align: center;
        }
        .modal-title { color: #ffad33; font-size: 16px; margin-bottom: 12px; font-weight: bold; }
        .preview-box {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            background: #06090b; border: 1px solid #233541; border-radius: 8px; padding: 10px; margin-bottom: 12px;
        }
        .preview-item { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .preview-item span { font-size: 11px; color: #88a0b5; margin-top: 4px; }
        .preview-canvas { background: #0b0f12; border: 1px solid #1f272e; border-radius: 6px; }
        .modal-body { font-size: 12px; line-height: 1.5; color: #e1e7ed; text-align: left; margin-bottom: 14px; }
        .modal-btn {
            background: #4da6ff; color: #111; border: none; padding: 12px 28px;
            font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%;
        }
        #resultScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 18, 0.95); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 99; display: none;
        }
        #result-text { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>Dr. Pharmacology - 臨床解毒試驗</h1>
        <div class="warn-text">⚠️ 投錯藥引發抗藥外框（黃➡️紅➡️紫進化），且細菌會自動分裂增生！</div>
    </header>

    <div id="main-layout">
        <div id="resultScreen">
            <div id="result-text"></div>
            <button class="modal-btn" onclick="location.reload()" style="width:auto;">重新挑戰</button>
        </div>

        <div id="medicalModal">
            <div class="modal-title">🔬 發現新致病菌！</div>
            <div class="preview-box">
                <div class="preview-item">
                    <canvas id="bugPreview" class="preview-canvas" width="80" height="80"></canvas>
                    <span>顯微病原體圖案</span>
                </div>
                <div class="preview-item">
                    <canvas id="pillPreview" class="preview-canvas" width="80" height="80"></canvas>
                    <span>對應特效抗生素</span>
                </div>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <button class="modal-btn" id="closeModalBtn">確認病徵並開藥</button>
        </div>

        <div id="status-bar">
            <div>消滅菌數: <span id="score" style="color:#00ffcc;font-weight:bold;">0</span></div>
            <div>當前藥物: <span id="current-pill-text" style="color:#ffad33;font-weight:bold;">VA</span></div>
        </div>

        <div id="stage-container">
            <canvas id="gameCanvas" width="320" height="480"></canvas>
        </div>

        <div id="html-control-pad">
            <div class="dir-group"><div class="ctrl-btn" id="btn-left">◀ 左移</div></div>
            <div class="dir-group">
                <div class="ctrl-btn" id="btn-right">▶ 右移</div>
                <div class="ctrl-btn" id="btn-down" style="color: #ffad33;">▼ 加速</div>
            </div>
            <div class="ctrl-btn ctrl-btn-cycle" id="btn-cycle">物料切換<span>💊 CYCLE</span></div>
        </div>
    </div>

<script>
function resetVH() {
    let vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);
}
window.addEventListener('resize', resetVH);
window.addEventListener('orientationchange', resetVH);
resetVH();

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const COLS = 8;
const ROWS = 12; 
const BLOCK_SIZE = 40; 
const BACTERIA_MIN_ROW = 8;

const CLINICAL_DIAGNOSIS = {
    1: { name: "金黃色葡萄球菌 (S. aureus)", features: "多個圓形聚集、金黃色葡萄串狀", antibiotic: "萬古黴素 (Vancomycin)", abbr: "VA", details: "對抗超級細菌首選，中央標示縮寫 VA 的雙色膠囊。" },
    2: { name: "肺炎雙球菌 (S. pneumoniae)", features: "成對出現的紅色圓形、外部有莢膜包裹", antibiotic: "阿莫西林 (Amoxicillin)", abbr: "AMX", details: "常用廣效性青黴素，中央標示縮寫 AMX 的白黃雙色膠囊。" },
    3: { name: "大腸桿菌 (E. coli)", features: "紫色的長條圓角桿菌", antibiotic: "頭孢曲松 (Ceftriaxone)", abbr: "CRO", details: "第三代頭孢菌素，中央標示縮寫 CRO 的橘紫雙色膠囊。" },
    4: { name: "綠膿桿菌 (P. aeruginosa)", features: "綠色桿菌，尾端帶有多條波浪狀鞭毛", antibiotic: "環丙沙星 (Ciprofloxacin)", abbr: "CIP", details: "強效抗生素，中央標示縮寫 CIP 的藍白雙色膠囊。" },
    5: { name: "幽門螺桿菌 (H. pylori)", features: "藍色螺旋波浪狀軀體、尾端具叢生鞭毛", antibiotic: "克拉黴素 (Clarithromycin)", abbr: "CLR", details: "黃色圓形錠劑，中央帶有刻痕，縮寫依字母結構拆分排列兩側。" }
};

const MEDICINE_INFO = {
    1: { leftColor: "#ff6b81", rightColor: "#ff4757", isCapsule: true },
    2: { leftColor: "#f1f2f6", rightColor: "#f1c40f", isCapsule: true },
    3: { leftColor: "#e67e22", rightColor: "#9b59b6", isCapsule: true },
    4: { leftColor: "#3498db", rightColor: "#ffffff", isCapsule: true },
    5: { leftColor: "#f1c40f", rightColor: "#f1c40f", isCapsule: false }
};

const RESISTANCE_COLORS = { 0: null, 1: "#f1c40f", 2: "#e74c3c", 3: "#9b59b6" };

let grid = Array(ROWS).fill().map(() => Array(COLS).fill(null));
let killedCount = 0;
let isPaused = true; 
let gameOver = false;
let animFrameId = null;

let poolOfBacteria = [1, 2, 3, 4, 5];
poolOfBacteria.sort(() => Math.random() - 0.5); 
let discoveredBacteria = {}; 

// 🚀 物理流暢化下落藥丸結構
let currentPill = { x: 3, pixelY: 0, type: 1, speed: 0.8, isSettled: false, freezeFrames: 0 };
let visualEffects = []; 

class BiologicalBlock {
    constructor(type, isBacteria = false) {
        this.type = type; 
        this.isBacteria = isBacteria;
        this.resistanceLevel = 0; 
        this.requiredHits = 1;     
        this.scale = 1.0;         // 细胞分裂成長動畫
        this.pulseRadius = 0;     // 抗藥性突變外框波紋動畫
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.vx = (Math.random() - 0.5) * 7;
        this.vy = (Math.random() - 0.5) * 7 - 1;
        this.alpha = 1.0;
        this.size = Math.random() * 4 + 2;
    }
    update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.03; }
    draw() {
        ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }
}

function createExplosion(x, y, color1, color2, count = 25) {
    for (let i = 0; i < count; i++) {
        visualEffects.push(new Particle(x, y, Math.random() > 0.5 ? color1 : color2));
    }
}

function randomizePillType() {
    currentPill.type = Math.floor(Math.random() * 5) + 1;
    currentPill.pixelY = 0;
    currentPill.isSettled = false;
    currentPill.freezeFrames = 0;
    updatePillDisplay();
}

function updatePillDisplay() {
    document.getElementById('current-pill-text').innerText = CLINICAL_DIAGNOSIS[currentPill.type].abbr;
}

function spawnSingleBacteria() {
    let count = 0;
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) { if (grid[r][c] && grid[r][c].isBacteria) count++; }
    }
    if (count === 0 && poolOfBacteria.length === 0) { endGame(true); return; }

    if (count === 0 && poolOfBacteria.length > 0) {
        let nextBacteriaType = poolOfBacteria.pop(); 
        let r = Math.floor(Math.random() * (ROWS - BACTERIA_MIN_ROW - 1)) + BACTERIA_MIN_ROW;
        let c = Math.floor(Math.random() * (COLS - 1)); 
        grid[r][c] = new BiologicalBlock(nextBacteriaType, true);
        grid[r][c].scale = 0.01; // 從0點動態長大

        if (!discoveredBacteria[nextBacteriaType]) {
            discoveredBacteria[nextBacteriaType] = true;
            triggerMedicalModal(nextBacteriaType);
        }
    }
}

function renderModalPreviews(type) {
    const bugCanvas = document.getElementById('bugPreview');
    const pCtx = bugCanvas.getContext('2d'); pCtx.clearRect(0, 0, 80, 80);
    pCtx.save(); pCtx.translate(20, 20); drawBacteriaGraphic(pCtx, { type: type }); pCtx.restore();

    const pillCanvas = document.getElementById('pillPreview');
    const mCtx = pillCanvas.getContext('2d'); mCtx.clearRect(0, 0, 80, 80);
    let info = MEDICINE_INFO[type]; let diag = CLINICAL_DIAGNOSIS[type];
    mCtx.save();
    if (info.isCapsule) {
        mCtx.fillStyle = info.leftColor; mCtx.beginPath(); mCtx.roundRect(4, 28, 36, 24, [12, 0, 0, 12]); mCtx.fill();
        mCtx.fillStyle = info.rightColor; mCtx.beginPath(); mCtx.roundRect(40, 28, 36, 24, [0, 12, 12, 0]); mCtx.fill();
        mCtx.fillStyle = (info.leftColor === "#f1f2f6" || info.rightColor === "#ffffff") ? "#111" : "#fff";
        mCtx.font = "bold 13px sans-serif"; mCtx.textAlign = "center"; mCtx.textBaseline = "middle"; mCtx.fillText(diag.abbr, 40, 40);
    } else {
        mCtx.fillStyle = '#f1c40f'; mCtx.beginPath(); mCtx.arc(40, 40, 22, 0, Math.PI * 2); mCtx.fill();
        mCtx.strokeStyle = '#b7950b'; mCtx.lineWidth = 2; mCtx.beginPath(); mCtx.moveTo(40, 18); mCtx.lineTo(40, 62); mCtx.stroke(); 
        mCtx.fillStyle = '#7d6608'; mCtx.font = "bold 11px sans-serif"; mCtx.textBaseline = "middle";
        mCtx.textAlign = "right"; mCtx.fillText(diag.abbr.slice(0, 1), 37, 41); mCtx.textAlign = "left"; mCtx.fillText(diag.abbr.slice(1), 43, 41);    
    }
    mCtx.restore();
}

function triggerMedicalModal(type) {
    isPaused = true;
    let info = CLINICAL_DIAGNOSIS[type];
    renderModalPreviews(type);
    document.getElementById('modalBody').innerHTML = `
        <b style="color:#00ffcc;">病原體名稱：</b>${info.name}<br>
        <b style="color:#00ffcc;">顯微外觀：</b>${info.features}<br><br>
        <b style="color:#ffad33;">首選敏感抗生素：</b>${info.antibiotic} (${info.abbr})<br>
        <b style="color:#ff4757;">藥物劑型機制：</b>${info.details}
    `;
    document.getElementById('medicalModal').style.display = 'block';
}

document.getElementById('closeModalBtn').addEventListener('click', () => {
    document.getElementById('medicalModal').style.display = 'none';
    isPaused = false;
});

function drawBacteriaGraphic(targetCtx, block) {
    switch(block.type) {
        case 1:
            [[12,12],[24,10],[18,22],[10,26],[26,24],[18,10],[21,18],[28,14],[10,18]].forEach(p => {
                targetCtx.fillStyle = '#f39c12'; targetCtx.beginPath(); targetCtx.arc(p[0], p[1], 6, 0, Math.PI*2); targetCtx.fill();
                targetCtx.strokeStyle = '#d35400'; targetCtx.lineWidth = 1; targetCtx.stroke();
            }); break;
        case 2:
            targetCtx.fillStyle = 'rgba(231, 76, 60, 0.25)'; targetCtx.beginPath(); targetCtx.roundRect(4, 10, 32, 20, 10); targetCtx.fill();
            targetCtx.strokeStyle = '#922b21'; targetCtx.lineWidth = 1.5; targetCtx.stroke();
            [[14,20], [26,20]].forEach(cp => { targetCtx.fillStyle = '#e74c3c'; targetCtx.beginPath(); targetCtx.arc(cp[0], cp[1], 7, 0, Math.PI*2); targetCtx.fill(); });
            break;
        case 3:
            targetCtx.fillStyle = '#8e44ad'; targetCtx.beginPath(); targetCtx.roundRect(4, 13, 32, 14, 7); targetCtx.fill();
            targetCtx.strokeStyle = '#6c3483'; targetCtx.lineWidth = 1.5; targetCtx.stroke();
            break;
        case 4:
            targetCtx.fillStyle = '#27ae60'; targetCtx.beginPath(); targetCtx.roundRect(13, 4, 14, 24, 7); targetCtx.fill();
            targetCtx.strokeStyle = '#1e8449'; targetCtx.lineWidth = 1.5; targetCtx.stroke();
            targetCtx.strokeStyle = '#27ae60'; targetCtx.lineWidth = 1.5; targetCtx.beginPath();
            targetCtx.moveTo(20, 28); targetCtx.bezierCurveTo(15, 34, 25, 36, 16, 42);
            targetCtx.moveTo(16, 27); targetCtx.bezierCurveTo(10, 32, 18, 35, 12, 40);
            targetCtx.moveTo(24, 27); targetCtx.bezierCurveTo(26, 33, 20, 36, 24, 41); targetCtx.stroke();
            break;
        case 5:
            targetCtx.strokeStyle = '#2980b9'; targetCtx.lineWidth = 3.5; targetCtx.beginPath();
            targetCtx.moveTo(4, 15); targetCtx.bezierCurveTo(10, 6, 14, 26, 20, 16); targetCtx.bezierCurveTo(24, 8, 28, 24, 34, 15); targetCtx.stroke();
            targetCtx.strokeStyle = '#2980b9'; targetCtx.lineWidth = 1.2; targetCtx.beginPath();
            targetCtx.moveTo(34, 15); targetCtx.lineTo(40, 9); targetCtx.moveTo(34, 15); targetCtx.lineTo(42, 16); targetCtx.moveTo(34, 15); targetCtx.lineTo(39, 23); targetCtx.stroke();
            break;
    }
}

function drawBacteria(block, x, y) {
    ctx.save();
    if (block.scale < 1.0) block.scale += 0.04; // 細胞分裂生長平滑動畫

    ctx.translate(x + BLOCK_SIZE/2, y + BLOCK_SIZE/2);
    ctx.scale(block.scale, block.scale);
    ctx.translate(-BLOCK_SIZE/2, -BLOCK_SIZE/2);

    // 🔬 繪製抗藥性外框
    if (block.resistanceLevel > 0) {
        ctx.strokeStyle = RESISTANCE_COLORS[block.resistanceLevel];
        ctx.lineWidth = 3.5; 
        ctx.beginPath(); ctx.arc(20, 20, 17, 0, Math.PI * 2); ctx.stroke();

        // 💥 突變脈衝波紋擴張效果
        if (block.pulseRadius > 0) {
            ctx.save();
            ctx.globalAlpha = 1.0 - (block.pulseRadius / 15);
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(20, 20, 17 + block.pulseRadius, 0, Math.PI * 2); ctx.stroke();
            ctx.restore();
            block.pulseRadius += 0.8;
            if (block.pulseRadius >= 15) block.pulseRadius = 0;
        }
    }

    drawBacteriaGraphic(ctx, block);

    if (block.requiredHits > 0) {
        ctx.fillStyle = "#fff"; ctx.font = "bold 11px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("x" + block.requiredHits, 20, 24);
    }
    ctx.restore();
}

function drawDroppingPill(type, gridX, pixelY) {
    let diag = CLINICAL_DIAGNOSIS[type]; let info = MEDICINE_INFO[type];
    let startX = gridX * BLOCK_SIZE;

    ctx.save();
    if (info.isCapsule) {
        ctx.fillStyle = info.leftColor; ctx.beginPath(); ctx.roundRect(startX + 4, pixelY + 8, 36, 24, [12, 0, 0, 12]); ctx.fill();
        ctx.fillStyle = info.rightColor; ctx.beginPath(); ctx.roundRect(startX + 40, pixelY + 8, 36, 24, [0, 12, 12, 0]); ctx.fill();
        ctx.fillStyle = (info.leftColor === "#f1f2f6" || info.rightColor === "#ffffff") ? "#111" : "#fff";
        ctx.font = "bold 13px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(diag.abbr, startX + 40, pixelY + 20); 
    } else {
        ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(startX + 40, pixelY + 20, 16, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#b7950b'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(startX + 40, pixelY + 4); ctx.lineTo(startX + 40, pixelY + 36); ctx.stroke(); 
        ctx.fillStyle = '#7d6608'; ctx.font = "bold 10px sans-serif"; ctx.textBaseline = "middle";
        ctx.textAlign = "right"; ctx.fillText(diag.abbr.slice(0, 1), startX + 38, pixelY + 20);
        ctx.textAlign = "left";  ctx.fillText(diag.abbr.slice(1), startX + 42, pixelY + 20);
    }
    ctx.restore();
}

// 🎯 精準碰撞觸發與突變核心
function checkImpact(gridX, targetGridY) {
    if (targetGridY >= ROWS) return { hit: false, consumed: false };
    
    let x1 = gridX; let x2 = gridX + 1;
    let target1 = grid[targetGridY][x1];
    let target2 = grid[targetGridY][x2];
    
    let medInfo = MEDICINE_INFO[currentPill.type];
    let pX = gridX * BLOCK_SIZE + BLOCK_SIZE;
    let pY = targetGridY * BLOCK_SIZE;

    if ((target1 && target1.isBacteria) || (target2 && target2.isBacteria)) {
        currentPill.isSettled = true;
        currentPill.freezeFrames = 12; // 凍結定格畫面，給予充足時間播完粉碎粒子動畫

        let isCorrect = false;
        if (target1 && target1.type === currentPill.type) isCorrect = true;
        if (target2 && target2.type === currentPill.type) isCorrect = true;

        if (isCorrect) {
            // ✅ 投對敏感抗生素：雙重炸裂
            createExplosion(pX, pY + 20, medInfo.leftColor, medInfo.rightColor, 35);
            [target1, target2].forEach((t, idx) => {
                let cx = (idx === 0 ? x1 : x2);
                if (t && t.isBacteria) {
                    if (t.resistanceLevel > 0) {
                        t.resistanceLevel--; t.pulseRadius = 1; // 降級回歸脈衝
                        if (t.resistanceLevel === 2) t.requiredHits = 3;
                        if (t.resistanceLevel === 1) t.requiredHits = 2;
                        if (t.resistanceLevel === 0) t.requiredHits = 1;
                    } else {
                        t.requiredHits--;
                        if (t.requiredHits <= 0) grid[targetGridY][cx] = null; killedCount++;
                    }
                }
            });
            document.getElementById('score').innerText = killedCount;
        } else {
            // 🚫 投錯藥：抗生素粉碎淡出，細菌完全不增生，但突變色階大躍進
            createExplosion(pX, pY, medInfo.leftColor, medInfo.rightColor, 15);
            [target1, target2].forEach(t => {
                if (t && t.isBacteria && t.resistanceLevel < 3) {
                    t.resistanceLevel++;
                    t.pulseRadius = 1; // 觸發突變擴張擴散外框波紋動畫
                    if (t.resistanceLevel === 1) t.requiredHits = 2;
                    if (t.resistanceLevel === 2) t.requiredHits = 3;
                    if (t.resistanceLevel === 3) t.requiredHits = 4; // 紫色上限
                }
            });
        }
        return true;
    }
    return false;
}

// 🦠 動態增生分裂分裂擴張
function triggerBacterialDoubling() {
    let currentBacteria = [];
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c] && grid[r][c].isBacteria) currentBacteria.push({ r: r, c: c, block: grid[r][c] });
        }
    }
    currentBacteria.forEach(b => {
        let directions = [[0,1],[0,-1],[1,0],[-1,0]];
        for (let [dr, dc] of directions) {
            let nr = b.r + dr; let nc = b.c + dc;
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !grid[nr][nc]) {
                grid[nr][nc] = new BiologicalBlock(b.block.type, true);
                grid[nr][nc].resistanceLevel = b.block.resistanceLevel;
                grid[nr][nc].requiredHits = b.block.requiredHits;
                grid[nr][nc].scale = 0.05; // 細胞慢慢分裂膨脹長大
                if (nr === 0) endGame(false);
                break;
            }
        }
    });
}

function hasResistantBacteria() {
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) { if (grid[r][c] && grid[r][c].isBacteria && grid[r][c].resistanceLevel > 0) return true; }
    }
    return false;
}

// 🔄 物理與渲染最高幀率主循環 (60FPS 全動畫流暢化)
function gameLoop() {
    if (gameOver) return;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 培養皿網格繪製
    ctx.strokeStyle = '#12191f'; ctx.lineWidth = 1;
    for(let i=0; i<=COLS; i++) { ctx.beginPath(); ctx.moveTo(i*BLOCK_SIZE, 0); ctx.lineTo(i*BLOCK_SIZE, canvas.height); ctx.stroke(); }
    for(let i=0; i<=ROWS; i++) { ctx.beginPath(); ctx.moveTo(0, i*BLOCK_SIZE); ctx.lineTo(canvas.width, i*BLOCK_SIZE); ctx.stroke(); }
    ctx.fillStyle = "rgba(231, 76, 60, 0.02)";
    ctx.fillRect(0, BACTERIA_MIN_ROW * BLOCK_SIZE, canvas.width, (ROWS - BACTERIA_MIN_ROW) * BLOCK_SIZE);

    // 1. 物理位置演進與下落判定
    if (!isPaused && !currentPill.isSettled) {
        currentPill.pixelY += currentPill.speed;
        let currentGridY = Math.floor(currentPill.pixelY / BLOCK_SIZE);
        let nextGridY = currentGridY + 1;

        // 觸地判定或撞擊細菌判定
        if (nextGridY >= ROWS) {
            currentPill.isSettled = true;
            currentPill.freezeFrames = 10;
            let info = MEDICINE_INFO[currentPill.type];
            createExplosion(currentPill.x * BLOCK_SIZE + BLOCK_SIZE, canvas.height - 10, info.leftColor, info.rightColor, 12); // 著陸粉碎
            if (hasResistantBacteria()) triggerBacterialDoubling();
        } else {
            let hit = checkImpact(currentPill.x, nextGridY);
            if (!hit && (grid[nextGridY][currentPill.x] || grid[nextGridY][currentPill.x + 1])) {
                currentPill.isSettled = true; currentPill.freezeFrames = 10;
                if (hasResistantBacteria()) triggerBacterialDoubling();
            }
        }
    }

    // 2. 處理定格播動畫延時
    if (currentPill.isSettled) {
        currentPill.freezeFrames--;
        if (currentPill.freezeFrames <= 0) {
            randomizePillType();
            spawnSingleBacteria();
        }
    }

    // 3. 渲染靜態菌落
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c] && grid[r][c].isBacteria) drawBacteria(grid[r][c], c * BLOCK_SIZE, r * BLOCK_SIZE);
        }
    }

    // 4. 渲染飛行的抗生素
    if (!isPaused && !currentPill.isSettled) {
        drawDroppingPill(currentPill.type, currentPill.x, currentPill.pixelY);
    }

    // 5. 更新並噴射粉碎粒子
    for (let i = visualEffects.length - 1; i >= 0; i--) {
        visualEffects[i].update(); visualEffects[i].draw();
        if (visualEffects[i].alpha <= 0) visualEffects.splice(i, 1);
    }

    animFrameId = requestAnimationFrame(gameLoop);
}

function endGame(isSuccess) {
    gameOver = true; if (animFrameId) cancelAnimationFrame(animFrameId);
    let screen = document.getElementById('resultScreen'); let text = document.getElementById('result-text');
    if (isSuccess) { text.innerText = "🎉 治療成功！"; text.style.color = "#00ffcc"; } 
    else { text.innerText = "💀 治療失敗！培養皿已被污染"; text.style.color = "#ff4757"; }
    screen.style.display = "flex";
}

function cyclePillType() { if (isPaused || gameOver || currentPill.isSettled) return; currentPill.type = currentPill.type % 5 + 1; updatePillDisplay(); }
function moveLeft() { if (isPaused || gameOver || currentPill.isSettled) return; if (currentPill.x > 0 && !grid[Math.floor(currentPill.pixelY/BLOCK_SIZE)][currentPill.x - 1]) currentPill.x--; }
function moveRight() { if (isPaused || gameOver || currentPill.isSettled) return; if (currentPill.x + 1 < COLS - 1 && !grid[Math.floor(currentPill.pixelY/BLOCK_SIZE)][currentPill.x + 2]) currentPill.x++; }

const bindBtn = (id, action) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); action(); });
    el.addEventListener('click', (e) => { action(); });
};
bindBtn('btn-left', moveLeft); bindBtn('btn-right', moveRight);
bindBtn('btn-down', () => { if(!currentPill.isSettled) currentPill.speed = 7.0; }); // 按下加速向下俯衝
bindBtn('btn-cycle', cyclePillType);

window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') moveLeft(); if (e.key === 'ArrowRight') moveRight();
    if (e.key === 'ArrowDown' && !currentPill.isSettled) currentPill.speed = 7.0; if (e.key === 'ArrowUp' || e.key === ' ') cyclePillType();
});

spawnSingleBacteria(); randomizePillType();
gameLoop(); 
</script>
</body>
