<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dr. Pharmacology - 臨床解毒試驗 (第一關)</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        :root { --vh: 1vh; }
        body {
            background-color: #0b0f12; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            height: calc(var(--vh) * 100); overflow: hidden; touch-action: none;
            padding-bottom: env(safe-area-inset-bottom);
        }
        header {
            text-align: center; padding: 6px 5px; width: 100%;
            background: #11161b; border-bottom: 1px solid #1f272e; flex-shrink: 0;
        }
        h1 { margin: 0; font-size: 16px; color: #4da6ff; }
        .warn-text { font-size: 11px; color: #ff4757; margin-top: 1px; font-weight: bold; }

        #main-layout {
            display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 420px;
            flex-grow: 1; justify-content: space-between; position: relative; padding: 5px; overflow: hidden;
        }
        #status-bar {
            display: flex; justify-content: space-between; width: 100%;
            background: #11161b; border: 1px solid #1f272e; border-radius: 6px;
            padding: 6px 12px; font-size: 13px; flex-shrink: 0; margin-bottom: 4px;
        }
        #stage-container {
            position: relative; width: 100%; flex-grow: 1;
            display: flex; align-items: center; justify-content: center; overflow: hidden; min-height: 0;
        }
        canvas#gameCanvas {
            background: #06090b; border: 2px solid #233541; border-radius: 6px;
            max-height: 100%; max-width: 100%; object-fit: contain; display: block;
        }

        #html-control-pad {
            width: 100%; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px;
            padding: 12px 6px; background: #161d24; border-top: 2px solid #233541;
            border-radius: 12px 12px 0 0; flex-shrink: 0; box-shadow: 0 -4px 15px rgba(0,0,0,0.4);
        }
        .dir-group { display: flex; flex-direction: column; gap: 6px; }
        .ctrl-btn {
            background: linear-gradient(145deg, #25333f, #19232c); border: 2px solid #3d5466;
            border-radius: 10px; color: #00ffcc; font-size: 16px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4); cursor: pointer; min-height: 54px;
            transition: all 0.05s ease;
        }
        .ctrl-btn:active { background: linear-gradient(145deg, #121a20, #1c2730); border-color: #00ffcc; transform: scale(0.96); }
        
        .ctrl-btn-component {
            background: linear-gradient(145deg, #3498db, #2980b9); border-color: #5dade2;
            color: #fff; font-size: 13px; flex-direction: column; gap: 2px; height: 100%;
        }
        .ctrl-btn-component span { font-size: 9px; opacity: 0.8; }
        .ctrl-btn-component:active { background: #21618c; border-color: #3498db; }

        .ctrl-btn-dose {
            background: linear-gradient(145deg, #e67e22, #d35400); border-color: #f39c12;
            color: #fff; font-size: 13px; flex-direction: column; gap: 2px; height: 100%;
        }
        .ctrl-btn-dose span { font-size: 9px; opacity: 0.8; }
        .ctrl-btn-dose:active { background: #ba4a00; border-color: #e67e22; }

        /* 🔬 臨床解說與 Canvas 獨立圖例彈窗 */
        #medicalModal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%;
            background: #11161b; border: 2px solid #4da6ff; border-radius: 14px; padding: 16px;
            z-index: 100; box-shadow: 0 0 30px rgba(0,0,0,0.95); display: none; text-align: center;
        }
        .modal-title { color: #ffad33; font-size: 16px; margin-bottom: 12px; font-weight: bold; }
        .preview-box {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            background: #06090b; border: 1px solid #233541; border-radius: 8px; padding: 10px; margin-bottom: 12px;
        }
        .preview-item { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .preview-item span { font-size: 11px; color: #88a0b5; margin-top: 4px; }
        .preview-canvas { background: #0b0f12; border: 1px solid #1f272e; border-radius: 6px; display: block; }
        .modal-body { font-size: 12px; line-height: 1.6; color: #e1e7ed; text-align: left; margin-bottom: 14px; }
        .modal-btn {
            background: #4da6ff; color: #111; border: none; padding: 12px 28px;
            font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%;
        }
        #resultScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 18, 0.95); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 99; display: none;
        }
        #result-text { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>Dr. Pharmacology - 臨床解毒試驗 (第一關)</h1>
        <div class="warn-text">⚠️ 沒碰藥集體增生！紫色超級細菌碰錯藥將原地分裂！</div>
    </header>

    <div id="main-layout">
        <div id="resultScreen">
            <div id="result-text"></div>
            <button class="modal-btn" onclick="location.reload()" style="width:auto;">重新挑戰</button>
        </div>

        <div id="medicalModal">
            <div class="modal-title" id="modalTitle">🔬 發現新致病菌！</div>
            <div class="preview-box">
                <div class="preview-item">
                    <canvas id="bugPreview" class="preview-canvas" width="80" height="80"></canvas>
                    <span>顯微病原體圖案</span>
                </div>
                <div class="preview-item">
                    <canvas id="pillPreview" class="preview-canvas" width="80" height="80"></canvas>
                    <span>對應特效抗生素</span>
                </div>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <button class="modal-btn" id="closeModalBtn">確認病徵並開藥</button>
        </div>

        <div id="status-bar">
            <div>消滅菌數: <span id="score" style="color:#00ffcc;font-weight:bold;">0</span> / 5</div>
            <div>當前藥物: <span id="current-pill-text" style="color:#ffad33;font-weight:bold;">VA</span></div>
        </div>

        <div id="stage-container">
            <canvas id="gameCanvas" width="320" height="480"></canvas>
        </div>

        <div id="html-control-pad">
            <div class="dir-group"><div class="ctrl-btn" id="btn-left">◀ 左移</div></div>
            <div class="dir-group">
                <div class="ctrl-btn" id="btn-right">▶ 右移</div>
                <div class="ctrl-btn" id="btn-down" style="color: #ffad33;">▼ 加速</div>
            </div>
            <div class="ctrl-btn ctrl-btn-component" id="btn-component">成分切換<span>💊 CYCLE</span></div>
            <div class="ctrl-btn ctrl-btn-dose" id="btn-dose">劑量切換<span>🔄 橫縱切換</span></div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const COLS = 8;
const ROWS = 12; 
const BLOCK_SIZE = 40; 
const BACTERIA_TARGET_ROW = 8; // 固定出現在第 8 列

const CLINICAL_DIAGNOSIS = {
    1: { name: "金黃色葡萄球菌 (S. aureus)", features: "多個圓形聚集、金黃色葡萄串狀", antibiotic: "萬古黴素 (Vancomycin)", abbr: "VA" },
    2: { name: "肺炎雙球菌 (S. pneumoniae)", features: "成對出現的紅色圓形、外部有莢膜包裹", antibiotic: "阿莫西林 (Amoxicillin)", abbr: "AMX" },
    3: { name: "大腸桿菌 (E. coli)", features: "紫色的長條圓角桿菌", antibiotic: "頭孢曲松 (Ceftriaxone)", abbr: "CRO" },
    4: { name: "綠膿桿菌 (P. aeruginosa)", features: "綠色桿菌，尾端帶有多條波浪狀鞭毛", antibiotic: "環丙沙星 (Ciprofloxacin)", abbr: "CIP" },
    5: { name: "幽門螺桿菌 (H. pylori)", features: "藍色螺旋波浪狀軀體、尾端具叢生鞭毛", antibiotic: "克拉黴素 (Clarithromycin)", abbr: "CLR" }
};

const MEDICINE_INFO = {
    1: { leftColor: "#ff6b81", rightColor: "#ff4757", isCapsule: true },
    2: { leftColor: "#f1f2f6", rightColor: "#f1c40f", isCapsule: true },
    3: { leftColor: "#e67e22", rightColor: "#9b59b6", isCapsule: true },
    4: { leftColor: "#3498db", rightColor: "#ffffff", isCapsule: true },
    5: { leftColor: "#f1c40f", rightColor: "#f1c40f", isCapsule: false }
};

const RESISTANCE_COLORS = { 0: null, 1: "#f1c40f", 2: "#e74c3c", 3: "#9b59b6" };

let grid = Array(ROWS).fill().map(() => Array(COLS).fill(null));
let killedCount = 0;
let isPaused = true; 
let gameOver = false;
let animFrameId = null;

// ⚡ 隨機不重複的細菌池機制
let poolOfBacteria = [1, 2, 3, 4, 5];
poolOfBacteria.sort(() => Math.random() - 0.5); 

let currentPendingBacteriaType = null; // 紀錄目前彈窗中，正準備生成的細菌

let currentPill = { x: 3, pixelY: 0, type: 1, speed: 0.8, isSettled: false, freezeFrames: 0, rotation: 0 };
let visualEffects = []; 

class BiologicalBlock {
    constructor(type, isBacteria = false) {
        this.type = type; 
        this.isBacteria = isBacteria;
        this.resistanceLevel = 0; 
        this.scale = 1.0; 
        this.pulseRadius = 0;     
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8 - 1;
        this.alpha = 1.0;
        this.size = Math.random() * 4 + 2;
    }
    update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.03; }
    draw() {
        ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }
}

function createExplosion(x, y, color1, color2, count = 25) {
    for (let i = 0; i < count; i++) {
        visualEffects.push(new Particle(x, y, Math.random() > 0.5 ? color1 : color2));
    }
}

function randomizePillType() {
    currentPill.type = Math.floor(Math.random() * 5) + 1;
    currentPill.pixelY = 0;
    currentPill.speed = 0.8;
    currentPill.isSettled = false;
    currentPill.freezeFrames = 0;
    currentPill.rotation = 0; 
    updatePillDisplay();
}

function updatePillDisplay() {
    document.getElementById('current-pill-text').innerText = CLINICAL_DIAGNOSIS[currentPill.type].abbr;
}

// ⚡ 關卡核心：檢查並準備下一隻細菌的解說與誕生
function progressNextBacteriaWorkflow() {
    // 檢查畫面上是否還有細菌
    let activeCount = 0;
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) { if (grid[r][c] && grid[r][c].isBacteria) activeCount++; }
    }
    
    // 如果被消滅乾淨了
    if (activeCount === 0) {
        if (poolOfBacteria.length > 0) {
            // 從池子抽出一隻全新不重複的細菌，進入準備解說狀態
            currentPendingBacteriaType = poolOfBacteria.pop();
            triggerMedicalModal(currentPendingBacteriaType);
        } else {
            // 5隻都消滅完了，關卡勝利！
            endGame(true);
        }
    }
}

// ⚡ 實體化細菌到地圖上 (在解說視窗按下確認後才執行)
function spawnPendingBacteria() {
    if (currentPendingBacteriaType !== null) {
        let r = BACTERIA_TARGET_ROW;
        let c = Math.floor(Math.random() * (COLS - 2)) + 1; // 隨機出現在中央隨機行
        grid[r][c] = new BiologicalBlock(currentPendingBacteriaType, true);
        currentPendingBacteriaType = null; // 清空等候狀態
    }
}

function triggerMedicalModal(type) {
    isPaused = true;
    let info = CLINICAL_DIAGNOSIS[type];
    
    document.getElementById('modalTitle').innerText = `🔬 發現第 ${5 - poolOfBacteria.length} / 5 隻致病菌！`;
    document.getElementById('modalBody').innerHTML = `
        <b style="color:#00ffcc;">病原體名稱：</b>${info.name}<br>
        <b style="color:#00ffcc;">顯微外觀：</b>${info.features}<br>
        <b style="color:#ff4757;">首選敏感抗生素：</b>${info.antibiotic} (${info.abbr})
    `;

    let bCanvas = document.getElementById('bugPreview');
    let bCtx = bCanvas.getContext('2d');
    bCtx.clearRect(0,0,80,80);
    bCtx.save(); bCtx.scale(2, 2); drawBacteriaGraphic(bCtx, type, 0, 0); bCtx.restore();

    let pCanvas = document.getElementById('pillPreview');
    let pCtx = pCanvas.getContext('2d');
    pCtx.clearRect(0,0,80,80);
    pCtx.save(); drawModalPillGraphic(pCtx, type); pCtx.restore();

    document.getElementById('medicalModal').style.display = 'block';
}

// ⚡ 按下確認鍵：生成細菌並恢復遊戲
document.getElementById('closeModalBtn').addEventListener('click', () => {
    document.getElementById('medicalModal').style.display = 'none';
    spawnPendingBacteria();
    isPaused = false;
});

function drawBacteriaGraphic(targetCtx, type, offsetX, offsetY) {
    targetCtx.save();
    targetCtx.translate(offsetX, offsetY);
    switch(type) {
        case 1:
            [[12,12],[24,10],[18,22],[10,26],[26,24],[18,10],[21,18],[28,14],[10,18]].forEach(p => {
                targetCtx.fillStyle = '#f39c12'; targetCtx.beginPath(); targetCtx.arc(p[0], p[1], 5, 0, Math.PI*2); targetCtx.fill();
            }); break;
        case 2:
            targetCtx.fillStyle = 'rgba(231, 76, 60, 0.25)'; targetCtx.beginPath(); targetCtx.roundRect(4, 10, 32, 20, 10); targetCtx.fill();
            [[14,20], [26,20]].forEach(cp => { targetCtx.fillStyle = '#e74c3c'; targetCtx.beginPath(); targetCtx.arc(cp[0], cp[1], 6, 0, Math.PI*2); targetCtx.fill(); });
            break;
        case 3:
            targetCtx.fillStyle = '#8e44ad'; targetCtx.beginPath(); targetCtx.roundRect(4, 13, 32, 14, 7); targetCtx.fill();
            break;
        case 4:
            targetCtx.fillStyle = '#27ae60'; targetCtx.beginPath(); targetCtx.roundRect(13, 4, 14, 24, 7); targetCtx.fill();
            break;
        case 5:
            targetCtx.strokeStyle = '#2980b9'; targetCtx.lineWidth = 3.5; targetCtx.beginPath();
            targetCtx.moveTo(4, 15); targetCtx.bezierCurveTo(10, 6, 14, 26, 20, 16); targetCtx.bezierCurveTo(24, 8, 28, 24, 34, 15); targetCtx.stroke();
            break;
    }
    targetCtx.restore();
}

function drawModalPillGraphic(targetCtx, type) {
    let diag = CLINICAL_DIAGNOSIS[type]; let info = MEDICINE_INFO[type];
    if (info.isCapsule) {
        targetCtx.fillStyle = info.leftColor; targetCtx.beginPath(); targetCtx.roundRect(4, 28, 36, 24, [12, 0, 0, 12]); targetCtx.fill();
        targetCtx.fillStyle = info.rightColor; targetCtx.beginPath(); targetCtx.roundRect(40, 28, 36, 24, [0, 12, 12, 0]); targetCtx.fill();
        targetCtx.fillStyle = (info.leftColor === "#f1f2f6" || info.rightColor === "#ffffff") ? "#111" : "#fff";
        targetCtx.font = "bold 12px sans-serif"; targetCtx.textAlign = "center"; targetCtx.textBaseline = "middle"; targetCtx.fillText(diag.abbr, 40, 40); 
    } else {
        targetCtx.fillStyle = '#f1c40f'; targetCtx.beginPath(); targetCtx.arc(40, 40, 20, 0, Math.PI * 2); targetCtx.fill();
        targetCtx.fillStyle = '#7d6608'; targetCtx.font = "bold 11px sans-serif"; targetCtx.textBaseline = "middle"; targetCtx.textAlign = "center"; targetCtx.fillText(diag.abbr, 40, 40);
    }
}

function drawBacteria(block, x, y) {
    ctx.save();
    if (block.resistanceLevel > 0) {
        ctx.strokeStyle = RESISTANCE_COLORS[block.resistanceLevel];
        ctx.lineWidth = 4; 
        ctx.beginPath(); ctx.arc(x + 20, y + 20, 17, 0, Math.PI * 2); ctx.stroke();

        if (block.pulseRadius > 0) {
            ctx.save();
            ctx.globalAlpha = 1.0 - (block.pulseRadius / 16);
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(x + 20, y + 20, 17 + block.pulseRadius, 0, Math.PI * 2); ctx.stroke();
            ctx.restore();
            block.pulseRadius += 1.0;
            if (block.pulseRadius >= 16) block.pulseRadius = 0;
        }
    }
    drawBacteriaGraphic(ctx, block.type, x, y);
    ctx.restore();
}

function drawDroppingPill(type, gridX, pixelY, rotation) {
    let diag = CLINICAL_DIAGNOSIS[type]; let info = MEDICINE_INFO[type];
    let startX = gridX * BLOCK_SIZE;
    ctx.save();
    
    if (rotation === 0) {
        if (info.isCapsule) {
            ctx.fillStyle = info.leftColor; ctx.beginPath(); ctx.roundRect(startX + 4, pixelY + 8, 36, 24, [12, 0, 0, 12]); ctx.fill();
            ctx.fillStyle = info.rightColor; ctx.beginPath(); ctx.roundRect(startX + 40, pixelY + 8, 36, 24, [0, 12, 12, 0]); ctx.fill();
            ctx.fillStyle = (info.leftColor === "#f1f2f6" || info.rightColor === "#ffffff") ? "#111" : "#fff";
            ctx.font = "bold 13px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(diag.abbr, startX + 40, pixelY + 20); 
        } else {
            ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(startX + 40, pixelY + 20, 16, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#7d6608'; ctx.font = "bold 10px sans-serif"; ctx.textBaseline = "middle"; ctx.textAlign = "center"; ctx.fillText(diag.abbr, startX + 40, pixelY + 20);
        }
    } else {
        if (info.isCapsule) {
            ctx.fillStyle = info.leftColor; ctx.beginPath(); ctx.roundRect(startX + 8, pixelY + 4, 24, 36, [12, 12, 0, 0]); ctx.fill();
            ctx.fillStyle = info.rightColor; ctx.beginPath(); ctx.roundRect(startX + 8, pixelY + 40, 24, 36, [0, 0, 12, 12]); ctx.fill();
            ctx.fillStyle = (info.leftColor === "#f1f2f6" || info.rightColor === "#ffffff") ? "#111" : "#fff";
            ctx.font = "bold 13px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(diag.abbr, startX + 20, pixelY + 40); 
        } else {
            ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(startX + 20, pixelY + 40, 16, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#7d6608'; ctx.font = "bold 10px sans-serif"; ctx.textBaseline = "middle"; ctx.textAlign = "center"; ctx.fillText(diag.abbr, startX + 20, pixelY + 40);
        }
    }
    ctx.restore();
}

function checkImpact(gridX, targetGridY) {
    if (targetGridY >= ROWS) return false;
    
    let target1 = null; let target2 = null;
    let x1 = gridX; let x2 = gridX;
    let r1 = targetGridY; let r2 = targetGridY;

    if (currentPill.rotation === 0) {
        x2 = gridX + 1;
        if (x2 >= COLS) return false;
        target1 = grid[r1][x1]; target2 = grid[r2][x2];
    } else {
        r2 = targetGridY + 1;
        if (r2 >= ROWS) return false;
        target1 = grid[r1][x1]; target2 = grid[r2][x2];
    }
    
    if (!target1 && !target2) return false;

    currentPill.isSettled = true;
    currentPill.freezeFrames = 15; 
    
    let medInfo = MEDICINE_INFO[currentPill.type];
    createExplosion(gridX * BLOCK_SIZE + BLOCK_SIZE, targetGridY * BLOCK_SIZE + 20, medInfo.leftColor, medInfo.rightColor, 25);

    let targets = [target1, target2];
    let cells = [{r: r1, c: x1}, {r: r2, c: x2}];

    targets.forEach((t, idx) => {
        if (!t || !t.isBacteria) return;
        let pos = cells[idx];

        if (currentPill.type === t.type) {
            if (t.resistanceLevel > 0) {
                t.resistanceLevel--; t.pulseRadius = 1;
            } else {
                grid[pos.r][pos.c] = null; killedCount++;
                document.getElementById('score').innerText = killedCount;
            }
        } else {
            if (t.resistanceLevel < 3) {
                t.resistanceLevel++; t.pulseRadius = 1;
            } else if (t.resistanceLevel === 3) {
                triggerSingleBacterialSplit(pos.r, pos.c, t);
            }
        }
    });

    return true;
}

function triggerSingleBacterialSplit(r, c, b) {
    let directions = [[0,1],[0,-1],[1,0],[-1,0]];
    for (let [dr, dc] of directions) {
        let nr = r + dr; let nc = c + dc;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !grid[nr][nc]) {
            grid[nr][nc] = new BiologicalBlock(b.type, true);
            grid[nr][nc].resistanceLevel = 3; 
            if (nr === 0) endGame(false);
            break;
        }
    }
}

function triggerGlobalBacterialDoubling() {
    let currentBacteria = [];
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c] && grid[r][c].isBacteria) currentBacteria.push({ r: r, c: c, block: grid[r][c] });
        }
    }
    currentBacteria.forEach(b => {
        let directions = [[0,1],[0,-1],[1,0],[-1,0]];
        for (let [dr, dc] of directions) {
            let nr = b.r + dr; let nc = b.c + dc;
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !grid[nr][nc]) {
                grid[nr][nc] = new BiologicalBlock(b.block.type, true);
                grid[nr][nc].resistanceLevel = b.block.resistanceLevel;
                if (nr === 0) endGame(false);
                break;
            }
        }
    });
}

function gameLoop() {
    if (gameOver) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.strokeStyle = '#12191f'; ctx.lineWidth = 1;
    for(let i=0; i<=COLS; i++) { ctx.beginPath(); ctx.moveTo(i*BLOCK_SIZE, 0); ctx.lineTo(i*BLOCK_SIZE, canvas.height); ctx.stroke(); }
    for(let i=0; i<=ROWS; i++) { ctx.beginPath(); ctx.moveTo(0, i*BLOCK_SIZE); ctx.lineTo(canvas.width, i*BLOCK_SIZE); ctx.stroke(); }

    if (!isPaused && !currentPill.isSettled) {
        currentPill.pixelY += currentPill.speed;
        let checkHeight = (currentPill.rotation === 0) ? BLOCK_SIZE : BLOCK_SIZE * 2;
        let nextGridY = Math.floor((currentPill.pixelY + checkHeight - 5) / BLOCK_SIZE);

        if (nextGridY >= ROWS) {
            currentPill.isSettled = true; currentPill.freezeFrames = 12;
            let info = MEDICINE_INFO[currentPill.type];
            createExplosion(currentPill.x * BLOCK_SIZE + BLOCK_SIZE, canvas.height - 10, info.leftColor, info.rightColor, 15);
            triggerGlobalBacterialDoubling(); 
        } else {
            checkImpact(currentPill.x, nextGridY);
        }
    }

    if (currentPill.isSettled) {
        currentPill.freezeFrames--;
        if (currentPill.freezeFrames <= 0) {
            randomizePillType();
            progressNextBacteriaWorkflow(); // ⚡ 每次藥丸落定，檢查細菌消滅狀態並推進
        }
    }

    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c] && grid[r][c].isBacteria) drawBacteria(grid[r][c], c * BLOCK_SIZE, r * BLOCK_SIZE);
        }
    }

    if (!isPaused && !currentPill.isSettled) {
        drawDroppingPill(currentPill.type, currentPill.x, currentPill.pixelY, currentPill.rotation);
    }

    for (let i = visualEffects.length - 1; i >= 0; i--) {
        visualEffects[i].update(); visualEffects[i].draw();
        if (visualEffects[i].alpha <= 0) visualEffects.splice(i, 1);
    }

    animFrameId = requestAnimationFrame(gameLoop);
}

function endGame(isSuccess) {
    gameOver = true; if (animFrameId) cancelAnimationFrame(animFrameId);
    let screen = document.getElementById('resultScreen'); let text = document.getElementById('result-text');
    if (isSuccess) { text.innerText = "🎉 第一關 通關成功！"; text.style.color = "#00ffcc"; } 
    else { text.innerText = "💀 培養皿已被超級抗藥菌污染"; text.style.color = "#ff4757"; }
    screen.style.display = "flex";
}

function cyclePillType() { 
    if (isPaused || gameOver || currentPill.isSettled) return; 
    currentPill.type = currentPill.type % 5 + 1; 
    updatePillDisplay(); 
}

function togglePillRotation() { 
    if (isPaused || gameOver || currentPill.isSettled) return; 
    if (currentPill.rotation === 0) {
        currentPill.rotation = 1;
    } else {
        if (currentPill.x + 1 >= COLS - 1) currentPill.x = COLS - 3;
        currentPill.rotation = 0;
    }
}

function moveLeft() { 
    if (isPaused || gameOver || currentPill.isSettled) return; 
    if (currentPill.x > 0) currentPill.x--; 
}
function moveRight() { 
    if (isPaused || gameOver || currentPill.isSettled) return; 
    let maxCols = (currentPill.rotation === 0) ? COLS - 2 : COLS - 1;
    if (currentPill.x < maxCols) currentPill.x++; 
}

function resetVH() { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); }
window.addEventListener('resize', resetVH); resetVH();

const bindBtn = (id, action) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); action(); });
    el.addEventListener('click', (e) => { action(); });
};
bindBtn('btn-left', moveLeft); bindBtn('btn-right', moveRight);
bindBtn('btn-down', () => { if(!currentPill.isSettled) currentPill.speed = 8.0; });
bindBtn('btn-component', cyclePillType);
bindBtn('btn-dose', togglePillRotation);

window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') moveLeft(); 
    if (e.key === 'ArrowRight') moveRight();
    if (e.key === 'ArrowDown' && !currentPill.isSettled) currentPill.speed = 8.0; 
    if (e.key === ' ') cyclePillType(); 
    if (e.key === 'ArrowUp') togglePillRotation(); 
});

// 🚀 啟動工作流：開局觸發第一隻細菌的解說
progressNextBacteriaWorkflow(); 
randomizePillType();
gameLoop(); 
</script>
</body>
</html>
